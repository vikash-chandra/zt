version: '3.8'

services:
  postgres:
    image: timescale/timescaledb:latest-pg15
    environment:
      POSTGRES_DB: zerodha_trading
      POSTGRES_PASSWORD: trading_password
      POSTGRES_USER: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASSWORD=trading_password
      - DB_NAME=zerodha_trading
      - DB_SSL_MODE=disable
      - KITE_API_KEY=${KITE_API_KEY}
      - KITE_API_SECRET=${KITE_API_SECRET}
      - KITE_USER_ID=${KITE_USER_ID}
      - KITE_ACCESS_TOKEN=${KITE_ACCESS_TOKEN}
      - KITE_REDIRECT_URL=${KITE_REDIRECT_URL}
      - STRATEGY_TYPE=${STRATEGY_TYPE:-VWAP_RSI}
      - SL_BUFFER_PCT=${SL_BUFFER_PCT:-0.0}
      - WATCHLIST_MAX_PCT_CHANGE=${WATCHLIST_MAX_PCT_CHANGE:-100.0}
      - INITIAL_CAPITAL=${INITIAL_CAPITAL:-500000}
      - MAX_DAILY_LOSS_PCT=${MAX_DAILY_LOSS_PCT:-2.0}
      - MAX_LOSS_AMOUNT=${MAX_LOSS_AMOUNT:-10000}
      - MAX_POSITION_SIZE=${MAX_POSITION_SIZE:-100000}
      - MAX_TRADES_PER_DAY=${MAX_TRADES_PER_DAY:-20}
      - MAX_LOSS_STREAKS=${MAX_LOSS_STREAKS:-3}
      - MAX_QTY_PER_ORDER=${MAX_QTY_PER_ORDER:-5000}
      - MIN_PROFIT_TARGET_PCT=${MIN_PROFIT_TARGET_PCT:-0.5}
      - MAX_HOLDING_TIME_MIN=${MAX_HOLDING_TIME_MIN:-30}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - PROMETHEUS_ADDR=:8888
      - ACTIVE_STRATEGIES=${ACTIVE_STRATEGIES:-LOW_VOLUME}
      - MAX_CAPITAL_PER_TRADE=${MAX_CAPITAL_PER_TRADE:-20000.0}
      - TRADE_START_TIME=${TRADE_START_TIME:-09:30}
      - TRADE_END_TIME=${TRADE_END_TIME:-10:45}
      - STOCK_SELECT_TIME=${STOCK_SELECT_TIME:-09:30}
      - WATCHLIST_SIZE=${WATCHLIST_SIZE:-10}
      - ACTIVE_SELECTORS=${ACTIVE_SELECTORS:-SECURITIES_FO}
      - STRATEGY_SELECTOR_MAP=${STRATEGY_SELECTOR_MAP:-LOW_VOLUME:SECURITIES_FO,VANDE_BHARAT:SECURITIES_FO}
      - RISK_REWARD_TYPE=${RISK_REWARD_TYPE:-STANDARD}
      - RISK_REWARD_RATIO=${RISK_REWARD_RATIO:-2.0}
    ports:
      - "8888:8888"
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
