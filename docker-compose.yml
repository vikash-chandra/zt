services:
  postgres:
    image: timescale/timescaledb:latest-pg15
    restart: always
    environment:
      POSTGRES_DB: zerodha_trading
      POSTGRES_PASSWORD: trading_password
      POSTGRES_USER: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASSWORD=trading_password
      - DB_NAME=zerodha_trading
      - GODEBUG=netdns=go   # Forces the Go native resolver
      - DB_SSL_MODE=disable
      - KITE_API_KEY=${KITE_API_KEY}
      - KITE_API_SECRET=${KITE_API_SECRET}
      - KITE_USER_ID=${KITE_USER_ID}
      - KITE_ACCESS_TOKEN=${KITE_ACCESS_TOKEN}
      - KITE_REDIRECT_URL=${KITE_REDIRECT_URL}
      - AWS_HOST_IP=${AWS_HOST_IP}
      - BROAD_SUBSCRIBE=${BROAD_SUBSCRIBE:-true}
      - MORNING_BROAD_AGG_START=${MORNING_BROAD_AGG_START:-09:15}
      - MORNING_BROAD_AGG_END=${MORNING_BROAD_AGG_END:-09:35}
      - LIVE_TRADING=${LIVE_TRADING:-true}
      - DEFAULT_ORDER_TYPE=${DEFAULT_ORDER_TYPE:-MARKET}
      - SQUARE_OFF_ON_SHUTDOWN=${SQUARE_OFF_ON_SHUTDOWN:-false}
      - INITIAL_CAPITAL=${INITIAL_CAPITAL:-100000}
      - MAX_TRADES_PER_DAY=${MAX_TRADES_PER_DAY:-1}
      - MAX_LOSS_STREAKS=${MAX_LOSS_STREAKS:-3}
      - MAX_HOLDING_TIME_MIN=${MAX_HOLDING_TIME_MIN:-360}
      - MAX_CAPITAL_PER_TRADE=${MAX_CAPITAL_PER_TRADE:-2000.0}
      - MAX_DAILY_LOSS_AMOUNT=${MAX_DAILY_LOSS_AMOUNT:-2500.0}
      - STRATEGY_WATCHLIST_SIZE=${STRATEGY_WATCHLIST_SIZE:-10}
      - MANUAL_BIAS_CUTOFF=${MANUAL_BIAS_CUTOFF:-10:38}
      - MANUAL_WATCHLIST_CUTOFF=${MANUAL_WATCHLIST_CUTOFF:-09:25}
      - STOCK_SELECT_TIME=${STOCK_SELECT_TIME:-09:25}
      - EVG_STOCK_SELECT_TIME=${EVG_STOCK_SELECT_TIME:-09:07}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - ACTIVE_STRATEGIES=${ACTIVE_STRATEGIES:-LOW_VOLUME,VANDE_BHARAT}
      - LV_SL_BUFFER_PCT=${LV_SL_BUFFER_PCT:-10.0}
      - LV_WATCHLIST_MAX_PCT_CHANGE=${LV_WATCHLIST_MAX_PCT_CHANGE:-2.5}
      - LV_TRADE_END_TIME=${LV_TRADE_END_TIME:-12:59}
      - ACTIVE_SELECTORS=${ACTIVE_SELECTORS:-SECURITIES_FO,SECTORAL,EQUITY_VOLUME_GAINERS}
      - STRATEGY_SELECTOR_MAP=${STRATEGY_SELECTOR_MAP:-LOW_VOLUME:SECURITIES_FO,VANDE_BHARAT:SECTORAL}
      - RISK_REWARD_TYPE=${RISK_REWARD_TYPE:-STANDARD}
      - RISK_REWARD_RATIO=${RISK_REWARD_RATIO:-2.0}
      - VB_SECTOR_MAX_BUY_PCT=${VB_SECTOR_MAX_BUY_PCT:-2.5}
      - VB_SECTOR_MAX_SELL_PCT=${VB_SECTOR_MAX_SELL_PCT:--3.0}
      - VB_STOCK_MAX_BUY_PCT=${VB_STOCK_MAX_BUY_PCT:-2.5}
      - VB_STOCK_MAX_SELL_PCT=${VB_STOCK_MAX_SELL_PCT:--2.5}
      - VB_MASTER_MAX_PCT=${VB_MASTER_MAX_PCT:-3.0}
      - VB_CONFIRM_MAX_PCT=${VB_CONFIRM_MAX_PCT:-1.0}
      - VB_TRADE_END_TIME=${VB_TRADE_END_TIME:-12:59}
      - VB_SL_BUFFER_PCT=${VB_SL_BUFFER_PCT:-10.0}
      - LV_USE_BROKER_SL=${LV_USE_BROKER_SL:-true}
      - VB_USE_BROKER_SL=${VB_USE_BROKER_SL:-true}
      - LV_MIN_CANDLES_TO_IGNORE=${LV_MIN_CANDLES_TO_IGNORE:-3}
      - VB_MIN_CANDLES_TO_IGNORE=${VB_MIN_CANDLES_TO_IGNORE:-2}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
